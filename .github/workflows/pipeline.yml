name: MLOps Model Pipeline

on: [push]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: pip install mlflow numpy dvc
      - name: Handle DVC
        run: |
          dvc init --no-scm
          dvc pull || echo "No remote data"
      - run: python train.py
      - uses: actions/upload-artifact@v4
        with:
          name: mlflow-results
          path: |
            mlruns/
            model_info.txt
          overwrite: true

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v3
      - uses: actions/download-artifact@v4
        with:
          name: mlflow-results
          path: .
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: pip install mlflow
      - run: python check_threshold.py
      - name: Build Docker Image
        run: |
          RUN_ID=$(cat model_info.txt)
          docker build --build-arg RUN_ID=$RUN_ID -t my-ml-model:latest .