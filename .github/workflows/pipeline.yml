name: MLOps Model Pipeline

on: [push]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install mlflow numpy dvc
      - name: Handle DVC
        run: |
          dvc pull --force
        continue-on-error: true # Prevents crash if DVC isn't fully set up yet
      - name: Train Model
        run: python train.py
      - name: Save Results
        uses: actions/upload-artifact@v4
        with:
          name: model-data
          path: |
            mlruns/
            model_info.txt

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v3
      - name: Download Results
        uses: actions/download-artifact@v4
        with:
          name: model-data
          path: .
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: pip install mlflow
      - name: Check Threshold
        run: python check_threshold.py
      - name: Build Docker Image
        run: |
          RUN_ID=$(cat model_info.txt)
          docker build --build-arg RUN_ID=$RUN_ID -t my-ml-model:latest .