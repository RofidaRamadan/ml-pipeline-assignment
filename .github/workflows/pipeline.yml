name: MLOps Model Pipeline

on: [push]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: pip install mlflow numpy
      - name: Train Model
        run: python train.py
      - name: Save Results for Deploy
        uses: actions/upload-artifact@v4
        with:
          name: model-data
          path: |
            mlruns/
            model_info.txt

  deploy:
    runs-on: ubuntu-latest
    needs: validate # <--- This makes the jobs wait for each other
    steps:
      - uses: actions/checkout@v3
      - name: Get Results from Validate
        uses: actions/download-artifact@v4
        with:
          name: model-data
          path: .
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: pip install mlflow
      - name: Check Threshold
        run: python check_threshold.py
      - name: Build Docker Image
        run: |
          RUN_ID=$(cat model_info.txt)
          docker build --build-arg RUN_ID=$RUN_ID -t my-ml-model:latest .
